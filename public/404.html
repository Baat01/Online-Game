<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>CardArena</title>
    <script type="text/javascript">
      /**
       * GitHub Pages SPA redirect fix.
       * When GH Pages gets a request for a path it doesn't know (e.g. /login),
       * it serves 404.html. This script reads the path from the URL and redirects
       * to index.html with the path encoded as a query param, which index.html
       * (via the companion script) decodes and uses to push to the correct route.
       *
       * Source: https://github.com/rafgraph/spa-github-pages
       */
      var segmentCount = 0
      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
